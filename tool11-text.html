<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本清理工具</title>
<meta name="description" content="提供文本去重、去空行、格式化、字数统计及查找替换等功能，简单高效的在线文本处理工具。">
<link rel="canonical" href="https://user-tools-tan.vercel.app/tool11-text.html">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--card:#fff;--ink:#0f172a;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0;--green:#10b981;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.topbar{background:#0f172a;color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:16px;}
.topbar a{color:#818cf8;text-decoration:none;font-size:.85rem;}.topbar a:hover{color:#fff;}
.topbar-title{font-family:'ZCOOL XiaoWei',serif;font-size:1.1rem;}
.container{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
.page-title{text-align:center;padding:24px 0 20px;}
.page-title h1{font-family:'ZCOOL XiaoWei',serif;font-size:2rem;letter-spacing:2px;}
.page-title h1 span{color:var(--accent);}
.page-title p{color:var(--muted);font-size:.9rem;margin-top:6px;}
.ad-bar{background:#f8fafc;border:1px dashed #c7d2fe;border-radius:10px;padding:12px;text-align:center;color:#4338ca;font-size:.8rem;margin-bottom:16px;}

/* STATS BAR */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:480px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-box .val{font-family:'ZCOOL XiaoWei',serif;font-size:1.6rem;color:var(--accent);}
.stat-box .name{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* TOOLS */
.tools-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.tool-btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:.82rem;transition:all .2s;color:var(--ink);}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);background:#eef2ff;}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* EDITOR */
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:640px){.editor-grid{grid-template-columns:1fr;}}
.editor-side{}
.editor-label{font-size:.8rem;color:var(--muted);font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.editor-label span{font-size:.75rem;color:var(--accent);}
textarea{
  width:100%;height:260px;padding:14px;
  border:1.5px solid var(--border);border-radius:12px;
  font-family:'Noto Sans SC',sans-serif;font-size:.88rem;
  resize:vertical;outline:none;line-height:1.7;
  transition:border-color .2s;background:#fff;color:var(--ink);
}
textarea:focus{border-color:var(--accent);}
textarea.output{background:#f8fafc;color:#1e293b;}
.action-row{display:flex;gap:8px;margin-top:10px;}
.action-btn{flex:1;padding:11px;border:1px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:.85rem;transition:all .2s;color:var(--muted);}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.action-btn.primary:hover{background:#4f46e5;}

/* DIFF highlight */
.diff-removed{color:#ef4444;}
.diff-added{color:#10b981;}

/* DEDUP SETTINGS */
.setting-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8fafc;border-radius:9px;margin-bottom:8px;font-size:.85rem;}
.setting-row input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;}
.setting-row label{cursor:pointer;}
.setting-row select{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-family:'Noto Sans SC',sans-serif;font-size:.82rem;outline:none;margin-left:auto;}

/* FIND REPLACE */
.fr-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;}
.fr-row input{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans SC',sans-serif;font-size:.88rem;outline:none;}
.fr-row input:focus{border-color:var(--accent);}
.fr-btn{padding:9px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:.85rem;white-space:nowrap;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← 返回首页</a><span style="color:#555">/</span>
  <span class="topbar-title">✂️ 文本清理工具</span>
</div>
<div class="container">
  <div class="page-title">
    <h1>文本<span>清理</span>工具</h1>
    <p>去重 · 去空行 · 格式化 · 字数统计 · 查找替换</p>
  </div>
  <div class="ad-bar">📢 广告位 · 自媒体/内容创作工具类合作欢迎联系</div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box"><div class="val" id="s-chars">0</div><div class="name">总字符数</div></div>
    <div class="stat-box"><div class="val" id="s-chars-no">0</div><div class="name">字符（不含空格）</div></div>
    <div class="stat-box"><div class="val" id="s-words">0</div><div class="name">单词/词组数</div></div>
    <div class="stat-box"><div class="val" id="s-lines">0</div><div class="name">总行数</div></div>
  </div>

  <!-- TOOLS ROW -->
  <div style="background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px;">
    <div style="font-size:.88rem;font-weight:700;margin-bottom:12px;color:var(--ink);">⚡ 一键处理</div>
    <div class="tools-row">
      <button class="tool-btn" onclick="removeDuplicates()">🔁 去重行</button>
      <button class="tool-btn" onclick="removeEmpty()">🧹 删除空行</button>
      <button class="tool-btn" onclick="trimSpaces()">✂️ 去除首尾空格</button>
      <button class="tool-btn" onclick="removeExtraSpaces()">🗜️ 压缩多余空格</button>
      <button class="tool-btn" onclick="toUpperCase()">⬆️ 转大写</button>
      <button class="tool-btn" onclick="toLowerCase()">⬇️ 转小写</button>
      <button class="tool-btn" onclick="reverseLines()">🔄 倒序行</button>
      <button class="tool-btn" onclick="sortLines()">🔤 行排序（升序）</button>
      <button class="tool-btn" onclick="sortLinesDesc()">🔡 行排序（降序）</button>
      <button class="tool-btn" onclick="addLineNumbers()">🔢 添加行号</button>
      <button class="tool-btn" onclick="removeLineNumbers()">➖ 去除行号</button>
      <button class="tool-btn" onclick="joinLines()">➡️ 合并为一行</button>
      <button class="tool-btn" onclick="removePunctuation()">💬 去除标点</button>
      <button class="tool-btn" onclick="removeHTML()">🌐 去除HTML标签</button>
      <button class="tool-btn" onclick="countFreq()">📊 词频统计</button>
    </div>

    <!-- FIND REPLACE -->
    <div style="font-size:.85rem;font-weight:700;margin:14px 0 8px;color:var(--muted);">查找替换</div>
    <div class="fr-row">
      <input type="text" id="fr-find" placeholder="查找内容">
      <input type="text" id="fr-replace" placeholder="替换为（留空则删除）">
      <button class="fr-btn" onclick="findReplace()">替换</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;font-size:.8rem;">
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--muted);">
        <input type="checkbox" id="fr-regex" style="accent-color:var(--accent);"> 正则表达式
      </label>
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--muted);">
        <input type="checkbox" id="fr-case" style="accent-color:var(--accent);"> 区分大小写
      </label>
    </div>

    <!-- DEDUP OPTIONS -->
    <div style="font-size:.85rem;font-weight:700;margin:14px 0 8px;color:var(--muted);">去重选项</div>
    <div class="setting-row">
      <input type="checkbox" id="dedup-trim" checked>
      <label for="dedup-trim">去重前去除每行首尾空格</label>
      <input type="checkbox" id="dedup-case" style="margin-left:16px;">
      <label for="dedup-case">区分大小写</label>
      <select id="dedup-keep">
        <option value="first">保留第一次出现</option>
        <option value="last">保留最后一次出现</option>
      </select>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-grid">
    <div class="editor-side">
      <div class="editor-label">输入文本 <span id="in-stat"></span></div>
      <textarea id="input-text" placeholder="在此粘贴或输入文本..." oninput="updateStats()"></textarea>
      <div class="action-row">
        <button class="action-btn" onclick="clearInput()">清空</button>
        <button class="action-btn primary" onclick="applyAll()">⚡ 一键格式化</button>
      </div>
    </div>
    <div class="editor-side">
      <div class="editor-label">处理结果 <span id="out-stat"></span></div>
      <textarea id="output-text" class="output" readonly placeholder="处理结果将显示在此处..."></textarea>
      <div class="action-row">
        <button class="action-btn" onclick="swapTexts()">⇄ 替换输入</button>
        <button class="action-btn primary" onclick="copyOutput()">📋 复制结果</button>
      </div>
    </div>
  </div>

  <!-- FREQ RESULT -->
  <div id="freq-result" style="display:none;margin-top:16px;background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;">
    <div style="font-size:.9rem;font-weight:700;margin-bottom:12px;">📊 词频统计结果</div>
    <div id="freq-table"></div>
  </div>

  <div class="ad-bar" style="margin-top:18px;">✍️ 自媒体文案写作服务 · AI辅助创作 · 欢迎合作</div>
</div>
<script>
function getInput(){ return document.getElementById('input-text').value; }
function setOutput(t){ document.getElementById('output-text').value = t; updateOutStats(t); }

function updateStats(){
  const t = getInput();
  const lines = t ? t.split('\n') : [];
  document.getElementById('s-chars').textContent = t.length.toLocaleString();
  document.getElementById('s-chars-no').textContent = t.replace(/\s/g,'').length.toLocaleString();
  document.getElementById('s-words').textContent = t.trim() ? t.trim().split(/\s+/).length.toLocaleString() : 0;
  document.getElementById('s-lines').textContent = lines.length.toLocaleString();
  document.getElementById('in-stat').textContent = `${t.length}字 / ${lines.length}行`;
}

function updateOutStats(t){
  const lines = t ? t.split('\n').length : 0;
  document.getElementById('out-stat').textContent = `${t.length}字 / ${lines}行`;
}

function clearInput(){ document.getElementById('input-text').value=''; updateStats(); setOutput(''); }
function swapTexts(){
  const out = document.getElementById('output-text').value;
  document.getElementById('input-text').value = out;
  updateStats(); setOutput('');
}
function copyOutput(){
  navigator.clipboard.writeText(document.getElementById('output-text').value).then(()=>alert('✅ 已复制'));
}

function process(fn){ const t = getInput(); setOutput(fn(t)); }

function removeDuplicates(){
  const trim = document.getElementById('dedup-trim').checked;
  const caseSensitive = document.getElementById('dedup-case').checked;
  const keep = document.getElementById('dedup-keep').value;
  process(t=>{
    const lines = t.split('\n');
    const seen = new Set();
    const result = keep==='first'
      ? lines.filter(l=>{ const k=trim?l.trim():l; const kk=caseSensitive?k:k.toLowerCase(); if(seen.has(kk)) return false; seen.add(kk); return true; })
      : lines.reverse().filter(l=>{ const k=trim?l.trim():l; const kk=caseSensitive?k:k.toLowerCase(); if(seen.has(kk)) return false; seen.add(kk); return true; }).reverse();
    return result.join('\n');
  });
}

function removeEmpty(){ process(t=>t.split('\n').filter(l=>l.trim()!=='').join('\n')); }
function trimSpaces(){ process(t=>t.split('\n').map(l=>l.trim()).join('\n')); }
function removeExtraSpaces(){ process(t=>t.replace(/[ \t]+/g,' ').split('\n').map(l=>l.trim()).join('\n')); }
function toUpperCase(){ process(t=>t.toUpperCase()); }
function toLowerCase(){ process(t=>t.toLowerCase()); }
function reverseLines(){ process(t=>t.split('\n').reverse().join('\n')); }
function sortLines(){ process(t=>t.split('\n').sort((a,b)=>a.localeCompare(b,'zh')).join('\n')); }
function sortLinesDesc(){ process(t=>t.split('\n').sort((a,b)=>b.localeCompare(a,'zh')).join('\n')); }
function addLineNumbers(){ process(t=>t.split('\n').map((l,i)=>`${i+1}. ${l}`).join('\n')); }
function removeLineNumbers(){ process(t=>t.split('\n').map(l=>l.replace(/^\d+[.、\)]\s*/,'')).join('\n')); }
function joinLines(){ process(t=>t.split('\n').filter(l=>l.trim()).join(' ')); }
function removePunctuation(){ process(t=>t.replace(/[，。！？、；：''""（）【】《》…—～·\.,!?;:'"()\[\]{}<>]/g,'')); }
function removeHTML(){ process(t=>t.replace(/<[^>]*>/g,'')); }

function findReplace(){
  const find = document.getElementById('fr-find').value;
  const replace = document.getElementById('fr-replace').value;
  const useRegex = document.getElementById('fr-regex').checked;
  const caseSensitive = document.getElementById('fr-case').checked;
  if (!find) { alert('请输入查找内容'); return; }
  process(t=>{
    try {
      const flags = 'g' + (caseSensitive?'':'i');
      const pattern = useRegex ? new RegExp(find, flags) : new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), flags);
      return t.replace(pattern, replace);
    } catch(e) { alert('正则表达式错误：'+e.message); return t; }
  });
}

function applyAll(){
  let t = getInput();
  t = t.split('\n').map(l=>l.trim()).filter(l=>l!=='').join('\n');
  t = t.replace(/[ \t]+/g,' ');
  setOutput(t);
}

function countFreq(){
  const t = getInput();
  if (!t.trim()) { alert('请先输入文本'); return; }
  const words = t.match(/[\u4e00-\u9fa5]+|[a-zA-Z]+/g) || [];
  const freq = {};
  words.forEach(w=>{ const k=w.toLowerCase(); freq[k]=(freq[k]||0)+1; });
  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,50);

  document.getElementById('freq-result').style.display='block';
  document.getElementById('freq-table').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;">
      ${sorted.map(([w,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:#f8fafc;border-radius:8px;font-size:.85rem;">
        <span>${w}</span><span style="font-weight:700;color:var(--accent)">${c}</span>
      </div>`).join('')}
    </div>`;
  document.getElementById('freq-result').scrollIntoView({behavior:'smooth'});
}

updateStats();
</script>
</body>
</html>
