<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间戳 & UTC 转换工具</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--card:#1a1d2e;--card2:#22263a;--ink:#e2e8f0;--muted:#64748b;--accent:#7c3aed;--border:#2d3151;--green:#10b981;--cyan:#06b6d4;--yellow:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.topbar{background:#070a14;color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);}
.topbar a{color:#6366f1;text-decoration:none;font-size:.85rem;}.topbar a:hover{color:#a5b4fc;}
.topbar-title{font-family:'ZCOOL XiaoWei',serif;font-size:1.1rem;}
.container{max-width:820px;margin:0 auto;padding:24px 16px 60px;}
.page-title{text-align:center;padding:24px 0 20px;}
.page-title h1{font-family:'ZCOOL XiaoWei',serif;font-size:2rem;letter-spacing:2px;color:#e2e8f0;}
.page-title h1 span{color:var(--accent);}
.page-title p{color:var(--muted);font-size:.9rem;margin-top:6px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:18px;}
.card-title{font-size:.9rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--cyan);}
.ad-bar{background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:12px;text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:16px;}

/* NOW */
.now-display{text-align:center;padding:16px;}
.now-ts{font-family:'JetBrains Mono',monospace;font-size:2.6rem;color:var(--accent);letter-spacing:2px;line-height:1;}
.now-ms{font-family:'JetBrains Mono',monospace;font-size:1.2rem;color:var(--yellow);margin-top:6px;}
.now-iso{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted);margin-top:6px;}
.now-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.now-item{background:var(--card2);border-radius:10px;padding:12px;text-align:center;}
.now-item-val{font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--green);}
.now-item-name{font-size:.72rem;color:var(--muted);margin-top:3px;}

/* INPUT AREAS */
.mono-input{
  width:100%;padding:12px 14px;
  background:var(--card2);border:1.5px solid var(--border);border-radius:9px;
  font-family:'JetBrains Mono',monospace;font-size:.95rem;color:var(--ink);
  outline:none;transition:border-color .2s;
}
.mono-input:focus{border-color:var(--accent);}
.mono-output{
  width:100%;padding:12px 14px;
  background:#0d1025;border:1.5px solid var(--border);border-radius:9px;
  font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--green);
  cursor:pointer;
}
.label{font-size:.78rem;color:var(--muted);margin-bottom:6px;display:block;font-weight:600;}
.convert-btn{
  width:100%;padding:12px;margin-top:10px;
  background:var(--accent);color:#fff;border:none;border-radius:9px;
  font-size:.9rem;font-weight:700;font-family:'Noto Sans SC',sans-serif;cursor:pointer;
  transition:all .2s;
}
.convert-btn:hover{background:#6d28d9;}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
@media(max-width:480px){.result-grid{grid-template-columns:1fr;}}
.result-item{background:var(--card2);border-radius:9px;padding:12px;}
.result-item .r-label{font-size:.72rem;color:var(--muted);margin-bottom:4px;}
.result-item .r-val{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--green);cursor:pointer;word-break:break-all;}
.result-item .r-val:hover{color:var(--cyan);}
.copy-row{display:flex;gap:8px;margin-top:10px;}
.copy-btn-sm{flex:1;padding:9px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.8rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all .2s;}
.copy-btn-sm:hover{border-color:var(--accent);color:var(--accent);}

/* TIMEZONE */
.tz-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:480px){.tz-row{grid-template-columns:1fr;}}
.tz-row select{padding:10px 12px;background:var(--card2);border:1.5px solid var(--border);border-radius:9px;font-family:'Noto Sans SC',sans-serif;font-size:.88rem;color:var(--ink);outline:none;}

/* WORLD CLOCK */
.world-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(max-width:480px){.world-grid{grid-template-columns:1fr;}}
.world-item{background:var(--card2);border-radius:10px;padding:12px 14px;}
.world-city{font-size:.8rem;color:var(--muted);margin-bottom:3px;}
.world-time{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--cyan);}
.world-offset{font-size:.72rem;color:var(--muted);margin-top:2px;}

.divider{height:1px;background:var(--border);margin:14px 0;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← 返回首页</a><span style="color:#555">/</span>
  <span class="topbar-title">⏱️ 时间戳 & UTC 转换</span>
</div>
<div class="container">
  <div class="page-title">
    <h1>时间戳<span>转换</span>工具</h1>
    <p>Unix时间戳 · 本地时间 · UTC · 时区转换 · 程序员必备</p>
  </div>
  <div class="ad-bar">📢 广告位 · 开发者工具 / 效率应用类合作欢迎联系</div>

  <!-- NOW -->
  <div class="card">
    <div class="card-title">⚡ 当前时间（实时）</div>
    <div class="now-display">
      <div class="now-ts" id="now-ts">--</div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:2px;">Unix 时间戳（秒）</div>
      <div class="now-ms" id="now-ms">--</div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:2px;">毫秒时间戳</div>
      <div class="now-iso" id="now-iso">--</div>
    </div>
    <div class="now-row">
      <div class="now-item"><div class="now-item-val" id="n-local">--</div><div class="now-item-name">本地时间</div></div>
      <div class="now-item"><div class="now-item-val" id="n-utc">--</div><div class="now-item-name">UTC 时间</div></div>
      <div class="now-item"><div class="now-item-val" id="n-week">--</div><div class="now-item-name">星期</div></div>
      <div class="now-item"><div class="now-item-val" id="n-tz">--</div><div class="now-item-name">时区偏移</div></div>
    </div>
    <div class="copy-row" style="margin-top:12px;">
      <button class="copy-btn-sm" onclick="copyText(document.getElementById('now-ts').textContent)">复制秒戳</button>
      <button class="copy-btn-sm" onclick="copyText(document.getElementById('now-ms').textContent)">复制毫秒戳</button>
      <button class="copy-btn-sm" onclick="copyText(document.getElementById('now-iso').textContent)">复制 ISO</button>
    </div>
  </div>

  <!-- TS TO DATE -->
  <div class="card">
    <div class="card-title">🔢 时间戳 → 日期</div>
    <span class="label">输入时间戳（支持秒/毫秒，自动识别）</span>
    <input class="mono-input" type="number" id="ts-input" placeholder="例：1700000000 或 1700000000000">
    <button class="convert-btn" onclick="ts2date()">转换</button>
    <div class="result-grid" id="ts-result" style="display:none;margin-top:12px;"></div>
  </div>

  <!-- DATE TO TS -->
  <div class="card">
    <div class="card-title">📅 日期 → 时间戳</div>
    <span class="label">输入日期时间</span>
    <input class="mono-input" type="datetime-local" id="date-input" step="1">
    <button class="convert-btn" onclick="date2ts()" style="margin-top:10px;">转换</button>
    <div class="result-grid" id="date-result" style="display:none;margin-top:12px;"></div>
  </div>

  <!-- TIMEZONE -->
  <div class="card">
    <div class="card-title">🌐 时区转换</div>
    <div class="tz-row">
      <div>
        <span class="label">从时区</span>
        <select id="tz-from">
          <option value="Asia/Shanghai">北京 / 上海 (UTC+8)</option>
          <option value="UTC">UTC (UTC+0)</option>
          <option value="America/New_York">纽约 (UTC-5/-4)</option>
          <option value="America/Los_Angeles">洛杉矶 (UTC-8/-7)</option>
          <option value="Europe/London">伦敦 (UTC+0/+1)</option>
          <option value="Europe/Paris">巴黎 (UTC+1/+2)</option>
          <option value="Asia/Tokyo">东京 (UTC+9)</option>
          <option value="Asia/Dubai">迪拜 (UTC+4)</option>
          <option value="Australia/Sydney">悉尼 (UTC+10/+11)</option>
        </select>
      </div>
      <div>
        <span class="label">到时区</span>
        <select id="tz-to">
          <option value="UTC">UTC (UTC+0)</option>
          <option value="Asia/Shanghai">北京 / 上海 (UTC+8)</option>
          <option value="America/New_York">纽约 (UTC-5/-4)</option>
          <option value="America/Los_Angeles">洛杉矶 (UTC-8/-7)</option>
          <option value="Europe/London">伦敦 (UTC+0/+1)</option>
          <option value="Europe/Paris">巴黎 (UTC+1/+2)</option>
          <option value="Asia/Tokyo">东京 (UTC+9)</option>
          <option value="Asia/Dubai">迪拜 (UTC+4)</option>
          <option value="Australia/Sydney">悉尼 (UTC+10/+11)</option>
        </select>
      </div>
    </div>
    <span class="label">输入日期时间</span>
    <input class="mono-input" type="datetime-local" id="tz-input" step="1">
    <button class="convert-btn" onclick="tzConvert()" style="margin-top:10px;">转换时区</button>
    <div id="tz-result" style="margin-top:12px;display:none;">
      <div class="result-item">
        <div class="r-label">转换结果</div>
        <div class="r-val" id="tz-output" onclick="copyText(this.textContent)">--</div>
      </div>
    </div>
  </div>

  <!-- WORLD CLOCK -->
  <div class="card">
    <div class="card-title">🌍 世界时钟</div>
    <div class="world-grid" id="world-grid"></div>
  </div>

  <div class="ad-bar">💻 程序员必备工具集 · 开发效率提升 · 欢迎推荐</div>
</div>
<script>
const WEEKS = ['日','一','二','三','四','五','六'];
const WORLD_ZONES = [
  {city:'北京', tz:'Asia/Shanghai'},
  {city:'东京', tz:'Asia/Tokyo'},
  {city:'纽约', tz:'America/New_York'},
  {city:'伦敦', tz:'Europe/London'},
  {city:'巴黎', tz:'Europe/Paris'},
  {city:'迪拜', tz:'Asia/Dubai'},
  {city:'悉尼', tz:'Australia/Sydney'},
  {city:'洛杉矶', tz:'America/Los_Angeles'},
];

function pad(n){return String(n).padStart(2,'0');}

function updateNow() {
  const now = new Date();
  const ts = Math.floor(now/1000);
  const ms = now.getTime();
  document.getElementById('now-ts').textContent = ts;
  document.getElementById('now-ms').textContent = ms;
  document.getElementById('now-iso').textContent = now.toISOString();
  document.getElementById('n-local').textContent = now.toLocaleTimeString('zh-CN',{hour12:false});
  document.getElementById('n-utc').textContent = now.toUTCString().split(' ').slice(4,5).join('') + ' UTC';
  document.getElementById('n-week').textContent = '星期' + WEEKS[now.getDay()];
  const off = -now.getTimezoneOffset();
  document.getElementById('n-tz').textContent = 'UTC' + (off>=0?'+':'') + (off/60).toFixed(1);

  // World clock
  document.getElementById('world-grid').innerHTML = WORLD_ZONES.map(z => {
    const t = now.toLocaleString('zh-CN',{timeZone:z.tz,hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const d = now.toLocaleDateString('zh-CN',{timeZone:z.tz,month:'numeric',day:'numeric',weekday:'short'});
    return `<div class="world-item">
      <div class="world-city">🌏 ${z.city}</div>
      <div class="world-time">${t}</div>
      <div class="world-offset">${d}</div>
    </div>`;
  }).join('');
}
updateNow();
setInterval(updateNow, 1000);

// Set default datetime-local inputs
const localNow = new Date();
localNow.setSeconds(0,0);
const localStr = localNow.toISOString().slice(0,19);
document.getElementById('date-input').value = localStr;
document.getElementById('tz-input').value = localStr;
document.getElementById('ts-input').value = Math.floor(Date.now()/1000);

function ts2date() {
  let ts = parseInt(document.getElementById('ts-input').value);
  if (isNaN(ts)) { alert('请输入有效时间戳'); return; }
  if (ts < 1e10) ts *= 1000; // seconds -> ms
  const d = new Date(ts);
  if (isNaN(d)) { alert('无效时间戳'); return; }
  const items = [
    {label:'本地时间', val: d.toLocaleString('zh-CN',{hour12:false})},
    {label:'UTC 时间', val: d.toUTCString()},
    {label:'ISO 8601', val: d.toISOString()},
    {label:'Unix秒', val: Math.floor(ts/1000).toString()},
    {label:'Unix毫秒', val: ts.toString()},
    {label:'星期', val: '星期' + WEEKS[d.getDay()]},
  ];
  const el = document.getElementById('ts-result');
  el.style.display='grid';
  el.innerHTML = items.map(i=>`<div class="result-item"><div class="r-label">${i.label}</div><div class="r-val" onclick="copyText('${i.val}')" title="点击复制">${i.val}</div></div>`).join('');
}

function date2ts() {
  const v = document.getElementById('date-input').value;
  if (!v) { alert('请选择日期时间'); return; }
  const d = new Date(v);
  const ts = Math.floor(d/1000);
  const ms = d.getTime();
  const items = [
    {label:'Unix 秒时间戳', val: ts.toString()},
    {label:'Unix 毫秒时间戳', val: ms.toString()},
    {label:'UTC 时间', val: d.toUTCString()},
    {label:'ISO 8601', val: d.toISOString()},
  ];
  const el = document.getElementById('date-result');
  el.style.display='grid';
  el.innerHTML = items.map(i=>`<div class="result-item"><div class="r-label">${i.label}</div><div class="r-val" onclick="copyText('${i.val}')" title="点击复制">${i.val}</div></div>`).join('');
}

function tzConvert() {
  const v = document.getElementById('tz-input').value;
  const fromTz = document.getElementById('tz-from').value;
  const toTz = document.getElementById('tz-to').value;
  if (!v) { alert('请选择日期时间'); return; }
  const d = new Date(v);
  const result = d.toLocaleString('zh-CN',{timeZone:toTz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',weekday:'long'});
  document.getElementById('tz-output').textContent = result;
  document.getElementById('tz-result').style.display='block';
}

function copyText(t) {
  navigator.clipboard.writeText(t).then(()=>{ /* silent */ });
}
</script>
</body>
</html>
